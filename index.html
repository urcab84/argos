<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCoN9xIxLf0-ft20BkQBElHTkIkZ0OzqGY",
  authDomain: "camiones-argos-integraciones.firebaseapp.com",
  projectId: "camiones-argos-integraciones",
  storageBucket: "camiones-argos-integraciones.firebasestorage.app",
  messagingSenderId: "53777572189",
  appId: "1:53777572189:web:2e5a74af819fff64f008b4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Roles y permisos
let currentUser = null;
let currentRol = null;
const PERMISOS = {
  admin:     { editar: true,  borrar: true,  cortes: true,  usuarios: true  },
  operativo: { editar: true,  borrar: false, cortes: false, usuarios: false },
  lectura:   { editar: false, borrar: false, cortes: false, usuarios: false },
};
function puedo(accion) { return currentRol ? (PERMISOS[currentRol]?.[accion] || false) : false; }

const COLECCIONES = ['unidades','operadores','clientes','viajes','cobros','gastos','nominas','aportaciones','cortes'];

async function sincronizarDesdeFirestore() {
  const indicador = document.getElementById('sync-status');
  if (indicador) { indicador.textContent = '☁ Sincronizando...'; indicador.style.color = '#d97706'; }
  try {
    // Contar total de documentos en Firebase antes de sobreescribir
    let totalDocs = 0;
    const snaps = {};
    for (const col of COLECCIONES) {
      const snap = await db.collection(col).get();
      snaps[col] = snap;
      totalDocs += snap.docs.length;
    }
    // Solo sobreescribir localStorage si Firebase tiene datos
    // Así evitamos borrar datos locales si Firebase está vacío
    if (totalDocs > 0) {
      for (const col of COLECCIONES) {
        localStorage.setItem(col, JSON.stringify(snaps[col].docs.map(d => d.data())));
      }
      if (indicador) { indicador.textContent = '☁ En linea'; indicador.style.color = '#16a34a'; }
    } else {
      if (indicador) { indicador.textContent = '☁ En linea (local)'; indicador.style.color = '#16a34a'; }
    }
    if (window._renderApp) window._renderApp();
  } catch(e) {
    if (indicador) { indicador.textContent = '⚠ Sin conexion'; indicador.style.color = '#dc2626'; }
    if (window._renderApp) window._renderApp();
  }
}

window._guardarEnFirestore = async function(coleccion, datos) {
  const indicador = document.getElementById('sync-status');
  try {
    const batch = db.batch();
    const snap = await db.collection(coleccion).get();
    snap.docs.forEach(d => batch.delete(d.ref));
    datos.forEach(item => { batch.set(db.collection(coleccion).doc(item.id), item); });
    await batch.commit();
    if (indicador) { indicador.textContent = '☁ Guardado'; indicador.style.color = '#16a34a'; setTimeout(() => { if(indicador) indicador.textContent = '☁ En linea'; }, 2000); }
  } catch(e) {
    if (indicador) { indicador.textContent = '⚠ Solo local'; indicador.style.color = '#dc2626'; }
  }
};

// Auth listener
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    try {
      const doc = await db.collection('usuarios').doc(user.uid).get();
      if (doc.exists) {
        currentRol = doc.data().rol || 'lectura';
      } else {
        await db.collection('usuarios').doc(user.uid).set({
          uid: user.uid, email: user.email,
          nombre: user.displayName || user.email.split('@')[0],
          rol: 'admin', creadoEn: new Date().toISOString()
        });
        currentRol = 'admin';
      }
    } catch(e) { currentRol = 'lectura'; }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    sincronizarDesdeFirestore();
  } else {
    currentUser = null; currentRol = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>
<style>
:root {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --bg3: #f8fafc;
  --bg4: #e2e8f0;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --text: #0f172a;
  --muted: #64748b;
  --hint: #94a3b8;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --blue-mid: #93c5fd;
  --orange: #ea580c;
  --orange-light: #ffedd5;
  --orange-mid: #fdba74;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --amber: #d97706;

}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; }
#app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ── Header ── */
#header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo-mark {
  width: 34px; height: 34px; background: var(--blue); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.header-logo-mark svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.header-title-wrap span:first-child { font-size: 16px; font-weight: 700; color: var(--text); display: block; }
.header-title-wrap span:last-child { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.btn-add {
  background: var(--orange); color: white; border: none;
  border-radius: var(--r-sm); padding: 8px 14px; font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer; display: flex;
  align-items: center; gap: 5px; box-shadow: 0 1px 4px rgba(234,88,12,0.3);
}
.btn-add:active { opacity: 0.85; transform: scale(0.97); }

#content { flex: 1; overflow-y: auto; padding-bottom: 76px; }

/* ── Nav ── */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 9px 4px 7px; background: none; border: none;
  color: var(--hint); font-family: var(--font); font-size: 10px;
  font-weight: 500; cursor: pointer; transition: color 0.15s; position: relative;
}
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active { color: var(--blue); }
.nav-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 25%; right: 25%;

}

/* ── Cards ── */
.section { padding: 14px 14px 0; }
.section-title { font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow);
}
.card-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 7px; }
.card-row:last-child { margin-bottom: 0; }
.card-label { font-size: 12px; color: var(--muted); }
.card-val { font-size: 13px; font-weight: 600; font-family: var(--mono); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }

/* ── Badges ── */
.badge { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-orange { background: var(--orange-light); color: var(--orange); }

/* ── Owner chips ── */

.chip-kike   { font-size: 11px; font-family: var(--mono); font-weight: 600; padding: 2px 9px; border-radius: 99px; background: var(--orange-light); color: var(--kike); }

.chip-cliente{ font-size: 11px; font-family: var(--mono); font-weight: 600; padding: 2px 9px; border-radius: 99px; background: var(--purple-light); color: var(--purple); }

/* ── Stats ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; box-shadow: var(--shadow); }

.stat-val { font-size: 21px; font-weight: 700; font-family: var(--mono); }
.stat-val.blue { color: var(--blue); }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-val.amber { color: var(--amber); }
.stat-val.orange { color: var(--orange); }

/* ── Forms ── */
.form-group { margin-bottom: 13px; }
.form-label { font-size: 11px; color: var(--muted); font-family: var(--mono); font-weight: 500; margin-bottom: 5px; display: block; letter-spacing: 0.04em; }
.form-input, .form-select, .form-textarea {

}

/* ── Buttons ── */
.btn { width: 100%; padding: 13px; border-radius: var(--r); font-family: var(--font); font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--blue); color: white; box-shadow: 0 1px 4px rgba(37,99,235,0.3); }

.btn-orange { background: var(--orange); color: white; box-shadow: 0 1px 4px rgba(234,88,12,0.3); }

.btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* ── Sheet ── */
.sheet-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }

.sheet-overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 0; }
.sheet-header { padding: 12px 16px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.sheet-title { font-size: 16px; font-weight: 700; }
.sheet-body { padding: 16px; }
.sheet-close { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 99px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── Tab strip ── */
.tab-strip { display: flex; gap: 6px; padding: 14px 14px 0; overflow-x: auto; scrollbar-width: none; }
.tab-strip::-webkit-scrollbar { display: none; }

.tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.tab-btn.active.orange { background: var(--orange); border-color: var(--orange); }

/* ── Aportaciones ── */
.apor-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

/* ── Empty ── */
.empty { text-align: center; padding: 40px 24px; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
.empty p { font-size: 14px; }

/* ── Alert box ── */
.alert { border-radius: var(--r-sm); padding: 10px 12px; font-size: 12px; margin-bottom: 12px; }
.alert-red { background: var(--red-light); color: var(--red); border: 1px solid #fca5a5; }
.alert-amber { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
.alert-blue { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-mid); }

@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.fade-in { animation: fadeUp 0.18s ease both; }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
// DB
// ══════════════════════════════════════════════════════
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  set(k, v) {
    localStorage.setItem(k, JSON.stringify(v));
    if (window._guardarEnFirestore) window._guardarEnFirestore(k, v);
  },
  id() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
};
window._renderApp = () => render();
function seed() {
  if (!localStorage.getItem('unidades')) DB.set('unidades', [
    { id: DB.id(), nombre: 'Unidad 1', placas: '', modelo: '' },
    { id: DB.id(), nombre: 'Unidad 2', placas: '', modelo: '' },
    { id: DB.id(), nombre: 'Unidad 3', placas: '', modelo: '' },
  ]);
  ['operadores','clientes','viajes','cobros','gastos','nominas','aportaciones','cortes'].forEach(k => {
    if (!localStorage.getItem(k)) DB.set(k, []);
  });
}
seed();

const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n||0).toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
const today = () => new Date().toISOString().slice(0,10);

function chipOwner(quien) {
  const map = {
    uriel: '<span class="chip-uriel">Uriel</span>',
    kike:  '<span class="chip-kike">Kike</span>',
    caja:  '<span class="chip-caja">Caja</span>',
    cliente: '<span class="chip-cliente">Anticipo</span>'
  };
  return map[quien] || quien;
}

function semanaActual() {
  const ahora = new Date();
  const y = ahora.getFullYear(), m = ahora.getMonth(), d = ahora.getDate();
  const hoy = new Date(y, m, d, 12, 0, 0); // mediodía local evita problemas de DST
  const diaSemana = hoy.getDay(); // 0=dom, 1=lun ... 6=sab
  const dom = new Date(y, m, d - diaSemana, 12, 0, 0);   // domingo de esta semana
  const sab = new Date(y, m, d + (6 - diaSemana), 12, 0, 0); // sábado de esta semana
  const iso = dt => {
    const yy = dt.getFullYear();
    const mm = String(dt.getMonth()+1).padStart(2,'0');
    const dd = String(dt.getDate()).padStart(2,'0');
    return yy+'-'+mm+'-'+dd;
  };
  return { ini: iso(dom), fin: iso(sab) };
}

function sueldoAcumulado(operadorId, semIni, semFin) {
  const viajes = DB.get('viajes').filter(v => v.operadorId === operadorId && v.fecha >= semIni && v.fecha <= semFin);
  const bruto = viajes.reduce((s,v) => s + (Number(v.flete||0) * Number(v.pctChofer||0) / 100), 0);
  const pagado = DB.get('nominas').filter(n => n.operadorId === operadorId && n.semanaIni === semIni && n.semanaFin === semFin).reduce((s,n) => s + Number(n.total||0), 0);
  return { bruto, pagado, pendiente: Math.max(0, bruto - pagado), viajes };
}

function saldoBalance() {
  const cortes = DB.get('cortes');
  const ultimoCorte = cortes.length ? cortes[cortes.length-1].fecha : null;
  const filtrar = arr => ultimoCorte ? arr.filter(x => (x.fecha||'') > ultimoCorte) : arr;
  const aports = filtrar(DB.get('aportaciones'));
  const cobros = filtrar(DB.get('cobros'));
  let uriel = aports.filter(a => a.quien === 'uriel').reduce((s,a) => s + Number(a.monto), 0);
  let kike  = aports.filter(a => a.quien === 'kike').reduce((s,a) => s + Number(a.monto), 0);
  uriel -= cobros.reduce((s,c) => s + Number(c.recuperaUriel||0), 0);
  kike  -= cobros.reduce((s,c) => s + Number(c.recuperaKike||0), 0);
  return { uriel: Math.max(0,uriel), kike: Math.max(0,kike) };
}

function viajeDeuda(viajeId) {
  const viaje = DB.get('viajes').find(v => v.id === viajeId);
  if (!viaje) return 0;
  const cobrado = DB.get('cobros').filter(c => c.viajeId === viajeId).reduce((s,c) => s + Number(c.monto), 0);
  const anticipo = Number(viaje.anticipo || 0);
  return Math.max(0, Number(viaje.flete) - anticipo - cobrado);
}

function calcCaja() {
  const viajes = DB.get('viajes');
  const cobros = DB.get('cobros');
  const gastos = DB.get('gastos');
  const nominas = DB.get('nominas');
  const aportaciones = DB.get('aportaciones');

  // ENTRADAS a caja
  // 1. Anticipos de clientes en viajes
  const anticipos = viajes.reduce((s,v) => s + Number(v.anticipo||0), 0);
  // 2. Remanente de cobros (utilidad que queda después de recuperar socios)
  const cobrosACaja = cobros.reduce((s,c) => s + Number(c.utilidad||0), 0);

  // SALIDAS de caja
  // 1. Gastos mensuales pagados de caja
  const gastosCaja = gastos.filter(g => g.quien === 'caja').reduce((s,g) => s + Number(g.monto||0), 0);
  // 2. Nóminas pagadas de caja
  const nominasCaja = nominas.filter(n => n.quien === 'caja').reduce((s,n) => s + Number(n.total||0), 0);
  // 3. Aportaciones de caja a viajes (financiamiento de gastos del viaje)
  const aportsCaja = aportaciones.filter(a => a.quien === 'caja').reduce((s,a) => s + Number(a.monto||0), 0);
  // 4. Gastos en camino pagados de caja
  const extrasViajeCaja = viajes.reduce((s,v) => {
    const extras = (v.gastosExtra || []).filter(g => g.quien === 'caja');
    return s + extras.reduce((ss,g) => ss + Number(g.monto||0), 0);
  }, 0);

  const total = anticipos + cobrosACaja - gastosCaja - nominasCaja - aportsCaja - extrasViajeCaja;
  return {
    total,
    anticipos,
    cobrosACaja,
    gastosCaja,
    nominasCaja,
    aportsCaja,
    extrasViajeCaja
  };
}

function renderNominaDash() {
  const operadores = DB.get('operadores');
  if (!operadores.length) return '<div style="font-size:13px;color:var(--muted);padding:8px 0">Sin operadores registrados</div>';
  const { ini, fin } = semanaActual();
  const filas = operadores.map(op => {
    const r = sueldoAcumulado(op.id, ini, fin);
    return r.bruto > 0 ? { op, ...r } : null;
  }).filter(Boolean);
  if (!filas.length) return '<div style="font-size:13px;color:var(--muted);padding:4px 0">Sin viajes esta semana ('+fmtDate(ini)+' – '+fmtDate(fin)+')</div>';
  const totalPend = filas.reduce((s,f) => s + f.pendiente, 0);
  return filas.map(f => `
  <div class="card" style="${f.pendiente>0?'border-color:#fcd34d':'border-color:#86efac'}">
    <div class="card-row">
      <span style="font-weight:600">${f.op.nombre}</span>
      <span class="card-val" style="color:${f.pendiente>0?'var(--amber)':'var(--green)'}">${f.pendiente>0?fmt(f.pendiente)+' pendiente':'✓ Pagado'}</span>
    </div>
    <div class="card-row">
      <span class="card-label">${f.viajes.length} viaje${f.viajes.length!==1?'s':''} · acumulado ${fmt(f.bruto)}</span>
      ${f.pagado>0?'<span class="badge badge-green">pagado '+fmt(f.pagado)+'</span>':''}
    </div>
    ${f.pendiente>0?'<button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;border-color:var(--amber);color:var(--amber)" onclick="pagarNominaDash(\''+f.op.id+'\',\''+ini+'\',\''+fin+'\','+f.pendiente+')">Registrar pago — '+fmt(f.pendiente)+'</button>':''}
  </div>`).join('') + (totalPend>0?'<div style="font-size:12px;color:var(--muted);text-align:right;margin-top:2px">Total semana: <strong style="color:var(--amber);font-family:var(--mono)">'+fmt(totalPend)+'</strong></div>':'');
}

window.saveNominaRapida = function(operadorId, semIni, semFin) {
  const total = parseFloat($('np-monto') && $('np-monto').value) || 0;

  const forma = $('np-forma') ? $('np-forma').value : 'efectivo';

  if (!total) { alert('Ingresa el monto'); return; }

  nominas.push({ id: DB.id(), operadorId, semanaIni: semIni, semanaFin: semFin, total, quien, forma, notas });

  if (quien === 'uriel' || quien === 'kike') {

};

      </div>

        <input class="form-input" type="password" inputmode="numeric" maxlength="4" id="nip-conf" placeholder="****" style="font-size:24px;letter-spacing:8px;text-align:center">
      </div>
      <button class="btn btn-primary" onclick="guardarNIP()">Crear NIP</button>
    `);
    window._nipCallback = onOk;
    return;
  }
  openSheet('Ingresa tu NIP', `
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:32px;margin-bottom:8px">🔒</div>
      <div style="font-size:14px;color:var(--muted)">Esta acción requiere tu NIP</div>

    <div id="nip-error" style="color:var(--red);font-size:13px;text-align:center;margin-bottom:10px;display:none">NIP incorrecto</div>
    <button class="btn btn-primary" onclick="verificarNIP()">Confirmar</button>
  `);
  window._nipCallback = onOk;
  setTimeout(() => { const el = $('nip-input'); if(el) { el.focus(); el.addEventListener('keydown', e => { if(e.key==='Enter') window.verificarNIP(); }); } }, 200);
}

window.guardarNIP = function() {
  const n1 = $('nip-nuevo') ? $('nip-nuevo').value : '';
  const n2 = $('nip-conf') ? $('nip-conf').value : '';
  if (n1.length !== 4 || !/^\d{4}$/.test(n1)) { alert('El NIP debe ser exactamente 4 dígitos'); return; }
  if (n1 !== n2) { alert('Los NIP no coinciden'); return; }
  setNIP(n1);
  closeSheet();
  if (window._nipCallback) { window._nipCallback(); window._nipCallback = null; }
};

window.verificarNIP = function() {
  const ingresado = $('nip-input') ? $('nip-input').value : '';
  if (ingresado === getNIP()) {
    closeSheet();
    if (window._nipCallback) { window._nipCallback(); window._nipCallback = null; }
  } else {
    const err = $('nip-error');
    if (err) { err.style.display = 'block'; }
    const inp = $('nip-input');
    if (inp) { inp.value = ''; inp.focus(); inp.style.borderColor = 'var(--red)'; }
  }
};

window.saveGastoExtra = function(viajeId) {
  const fecha = $('ge-fecha') ? $('ge-fecha').value : today();
  const concepto = $('ge-concepto') ? $('ge-concepto').value : '';
  const descripcion = $('ge-desc') ? $('ge-desc').value : '';
  const monto = parseFloat($('ge-monto') ? $('ge-monto').value : 0) || 0;
  const quien = $('ge-quien') ? $('ge-quien').value : 'caja';
  if (!monto) { alert('Ingresa el monto'); return; }
  const viajes = DB.get('viajes');
  const idx = viajes.findIndex(v => v.id === viajeId);
  if (idx < 0) return;
  if (!viajes[idx].gastosExtra) viajes[idx].gastosExtra = [];
  viajes[idx].gastosExtra.push({ fecha, concepto, descripcion, monto, quien });
  DB.set('viajes', viajes);
  if (quien === 'uriel' || quien === 'kike') {
    const aps = DB.get('aportaciones');
    aps.push({ id: DB.id(), viajeId, quien, monto, fecha, concepto: 'extra-'+concepto });
    DB.set('aportaciones', aps);
  }
  closeSheet();
  setTimeout(() => editViaje(viajeId), 150);
};

window.borrarGastoExtra = function(viajeId, gIdx) {
  pedirNIP(() => {
    const viajes = DB.get('viajes');
    const vi = viajes.findIndex(v => v.id === viajeId);
    if (vi < 0 || !viajes[vi].gastosExtra) return;
    viajes[vi].gastosExtra.splice(gIdx, 1);
    DB.set('viajes', viajes);
    setTimeout(() => editViaje(viajeId), 150);
  });
};

window.delViajeNIP = function(id) {

    DB.set('aportaciones', DB.get('aportaciones').filter(a => a.viajeId !== id));
    closeSheet(); render();
  });
};

    const mEl = document.getElementById('am-'+i);
    const monto = mEl ? (parseFloat(mEl.value)||0) : 0;
    if (monto > 0) aports.push({ quien: sel.value, monto });
  });

  const viajes = DB.get('viajes');
  const id = editId || DB.id();
  const data = { id, fecha, origen, destino, unidadId, operadorId, clienteId, flete, fechaVence, casetas, combustible, otrosGastos, pctChofer, viatico, km, anticipo };

  if (editId) {
    const idx = viajes.findIndex(v => v.id === editId);
    if (idx >= 0) viajes[idx] = Object.assign({}, viajes[idx], data);
    DB.set('viajes', viajes);
    // Borrar aportaciones anteriores de este viaje y agregar nuevas
    let aps = DB.get('aportaciones').filter(a => a.viajeId !== editId);
    const nuevasAps = aports.map(a => ({ id: DB.id(), viajeId: editId, fecha, ...a }));
    nuevasAps.forEach(a => aps.push(a));
    localStorage.setItem('aportaciones', JSON.stringify(aps));
    // Guardar en Firebase directamente cada aportación nueva
    if (window.db) {
      // Borrar las antiguas de este viaje en Firebase
      db.collection('aportaciones').where('viajeId', '==', editId).get().then(snap => {
        const batch = db.batch();
        snap.docs.forEach(d => batch.delete(d.ref));
        nuevasAps.forEach(a => batch.set(db.collection('aportaciones').doc(a.id), a));
        return batch.commit();
      }).catch(e => console.warn('Error guardando aportaciones:', e));
    }
  } else {
    viajes.push(data);
    DB.set('viajes', viajes);
    let aps = DB.get('aportaciones');
    const nuevasAps = aports.map(a => ({ id: DB.id(), viajeId: id, fecha, ...a }));
    nuevasAps.forEach(a => aps.push(a));
    localStorage.setItem('aportaciones', JSON.stringify(aps));
    // Guardar en Firebase directamente
    if (window.db) {
      const batch = db.batch();
      nuevasAps.forEach(a => batch.set(db.collection('aportaciones').doc(a.id), a));
      batch.commit().catch(e => console.warn('Error guardando aportaciones:', e));
    }
  }
  closeSheet(); render();
};

function renderCobros() {
  const el = document.createElement('div');
  const viajes = DB.get('viajes');
  const hoy = new Date();

  // Separar en grupos
  const vencidos   = viajes.filter(v => viajeDeuda(v.id) > 0 && v.fechaVence && new Date(v.fechaVence+'T12:00:00') < hoy).sort((a,b) => a.fechaVence.localeCompare(b.fechaVence));
  const pendientes = viajes.filter(v => viajeDeuda(v.id) > 0 && (!v.fechaVence || new Date(v.fechaVence+'T12:00:00') >= hoy)).sort((a,b) => (a.fechaVence||'9999').localeCompare(b.fechaVence||'9999'));
  const pagados    = viajes.filter(v => viajeDeuda(v.id) === 0 && DB.get('cobros').some(c => c.viajeId === v.id)).slice().reverse().slice(0,10);

  const totalPendiente = [...vencidos, ...pendientes].reduce((s,v) => s + viajeDeuda(v.id), 0);

  el.innerHTML = `
  <div class="tab-strip" id="cobros-tabs">
    <button class="tab-btn active" data-tab="pendientes">Por cobrar <span style="background:var(--amber);color:white;border-radius:99px;padding:1px 7px;font-size:10px;margin-left:4px">${vencidos.length + pendientes.length}</span></button>
    <button class="tab-btn" data-tab="vencidos">Vencidos <span style="background:var(--red);color:white;border-radius:99px;padding:1px 7px;font-size:10px;margin-left:4px">${vencidos.length}</span></button>
    <button class="tab-btn" data-tab="pagados">Pagados</button>
  </div>
  <div id="cobros-content" style="padding-bottom:8px">
    ${htmlCobrosPendientes(vencidos, pendientes, totalPendiente)}
  </div>`;

  setTimeout(() => {
    el.querySelectorAll('#cobros-tabs .tab-btn').forEach(btn => {
      btn.onclick = () => {
        el.querySelectorAll('#cobros-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        const content = $('cobros-content');
        if (tab === 'pendientes') content.innerHTML = htmlCobrosPendientes(vencidos, pendientes, totalPendiente);
        else if (tab === 'vencidos') content.innerHTML = htmlCobrosVencidos(vencidos);
        else content.innerHTML = htmlCobrosPagados(pagados);
      };
    });
  }, 0);
  return el;
}

function tarjetaCobro(v, opts) {
  const cliente = DB.get('clientes').find(c => c.id === v.clienteId);
  const deuda = viajeDeuda(v.id);
  const cobrosViaje = DB.get('cobros').filter(c => c.viajeId === v.id);
  const totalAbonado = cobrosViaje.reduce((s,c) => s + Number(c.monto), 0);
  const hoy = new Date();
  const vencido = v.fechaVence && new Date(v.fechaVence+'T12:00:00') < hoy;
  const pagado = deuda === 0;

  const pct = v.flete > 0 ? Math.round((totalAbonado / v.flete) * 100) : 0;

  return `
  <div class="card" style="border-left:3px solid ${pagado ? 'var(--green)' : vencido ? 'var(--red)' : 'var(--amber)'}">
    <div class="card-row">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="togglePagado('${v.id}')" style="width:28px;height:28px;border-radius:8px;border:2px solid ${pagado?'var(--green)':'var(--border2)'};background:${pagado?'var(--green)':'white'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">
          ${pagado ? '<span style="color:white">✓</span>' : ''}
        </button>
        <div>
          <div style="font-weight:600;font-size:14px">${cliente ? cliente.nombre : 'Sin cliente'}</div>
          <div class="card-label">${v.origen} → ${v.destino} · ${fmtDate(v.fecha)}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="card-val" style="color:${pagado?'var(--green)':vencido?'var(--red)':'var(--amber)'}">${pagado ? fmt(v.flete) : fmt(deuda)}</div>
        <div style="font-size:10px;color:var(--muted)">${pagado ? 'cobrado' : 'pendiente'}</div>
      </div>
    </div>

    ${!pagado && v.flete > 0 ? `
    <div style="margin:6px 0 4px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px">
        <span>Abonado ${fmt(totalAbonado)} de ${fmt(v.flete)}</span>
        <span>${pct}%</span>
      </div>
      <div style="height:5px;background:var(--bg4);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${vencido?'var(--red)':'var(--blue)'};border-radius:99px;transition:width 0.3s"></div>
      </div>
    </div>` : ''}

    <div class="card-row" style="margin-top:6px">
      ${v.fechaVence ? `<span class="badge ${pagado?'badge-green':vencido?'badge-red':'badge-amber'}">${pagado?'✓ Pagado':vencido?'VENCIDO · '+fmtDate(v.fechaVence):'vence '+fmtDate(v.fechaVence)}</span>` : '<span></span>'}
      ${!pagado ? `<button class="btn btn-ghost btn-sm" style="border-color:var(--blue);color:var(--blue)" onclick="abrirAbono('${v.id}')">+ Abono</button>` : ''}
    </div>

    ${cobrosViaje.length > 0 ? `
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      ${cobrosViaje.map(c => `<div class="card-row" style="margin-bottom:3px"><span class="card-label">${fmtDate(c.fecha)} · ${c.forma||'efectivo'}</span><span style="font-size:12px;font-family:var(--mono);font-weight:600;color:var(--green)">+${fmt(c.monto)}</span></div>`).join('')}
    </div>` : ''}
  </div>`;
}

function htmlCobrosPendientes(vencidos, pendientes, total) {
  const todos = [...vencidos, ...pendientes];
  if (!todos.length) return '<div class="section" style="padding-top:14px"><div class="empty"><div class="empty-icon">✅</div><p>Todo cobrado</p></div></div>';
  return `<div class="section" style="padding-top:14px">
    <div class="section-title">Por cobrar — ${fmt(total)}</div>
    ${todos.map(v => tarjetaCobro(v)).join('')}
  </div>`;
}

function htmlCobrosVencidos(vencidos) {
  if (!vencidos.length) return '<div class="section" style="padding-top:14px"><div class="empty"><div class="empty-icon">🎉</div><p>Sin pagos vencidos</p></div></div>';
  return `<div class="section" style="padding-top:14px">
    <div class="alert alert-red">Estos clientes tienen pagos vencidos</div>
    ${vencidos.map(v => tarjetaCobro(v)).join('')}
  </div>`;
}

function htmlCobrosPagados(pagados) {
  if (!pagados.length) return '<div class="section" style="padding-top:14px"><div class="empty"><div class="empty-icon">📋</div><p>Sin cobros completados</p></div></div>';
  return `<div class="section" style="padding-top:14px">
    <div class="section-title">Últimos pagados</div>
    ${pagados.map(v => tarjetaCobro(v)).join('')}
  </div>`;
}

// Toggle pagado completo (check rápido cuando pagan todo)
window.togglePagado = function(viajeId) {
  const deuda = viajeDeuda(viajeId);
  const viaje = DB.get('viajes').find(v => v.id === viajeId);
  const cobrosViaje = DB.get('cobros').filter(c => c.viajeId === viajeId);

// Abrir sheet de abono
window.abrirAbono = function(viajeId, montoSugerido) {
  const viaje = DB.get('viajes').find(v => v.id === viajeId);
  const deuda = viajeDeuda(viajeId);
  const cliente = DB.get('clientes').find(c => c.id === (viaje ? viaje.clienteId : ''));
  const aports = DB.get('aportaciones').filter(a => a.viajeId === viajeId && (a.quien === 'uriel' || a.quien === 'kike'));
  const yaU = DB.get('cobros').filter(c => c.viajeId === viajeId).reduce((s,c) => s + Number(c.recuperaUriel||0), 0);
  const yaK = DB.get('cobros').filter(c => c.viajeId === viajeId).reduce((s,c) => s + Number(c.recuperaKike||0), 0);
  const sugerido = montoSugerido || deuda;
  const anticipo = Number(viaje ? viaje.anticipo||0 : 0);

  openSheet('Registrar pago', `
    <div class="alert alert-blue" style="margin-bottom:12px">
      <strong>${cliente ? cliente.nombre : 'Cliente'}</strong><br>
      ${viaje ? viaje.origen+'→'+viaje.destino+' · '+fmtDate(viaje.fecha) : ''}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-row"><span class="card-label">Flete total</span><span class="card-val">${fmt(viaje ? viaje.flete : 0)}</span></div>
      ${anticipo > 0 ? '<div class="card-row"><span class="card-label">Anticipo aplicado</span><span class="card-val" style="color:var(--green)">-'+fmt(anticipo)+'</span></div>' : ''}
      <div class="card-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span style="font-weight:600">Saldo por cobrar</span><span class="card-val" style="color:var(--amber)">${fmt(deuda)}</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" onclick="setMonto(${deuda})" style="flex:1;border-color:var(--blue);color:var(--blue)">Total ${fmt(deuda)}</button>
      <button class="btn btn-ghost btn-sm" onclick="setMonto(${Math.round(deuda/2)})" style="flex:1">Mitad ${fmt(deuda/2)}</button>
    </div>
    <div class="form-group"><label class="form-label">MONTO DEL PAGO ($)</label>
      <input class="form-input" type="number" id="c-monto" value="${Math.round(sugerido)}" oninput="prevCobro(this,${JSON.stringify(aports)},${yaU},${yaK})">
    </div>
    <div class="form-group"><label class="form-label">FECHA DE PAGO</label>
      <input class="form-input" type="date" id="c-fecha" value="${today()}">
    </div>
    <div class="form-group"><label class="form-label">FORMA DE PAGO</label>
      <select class="form-select" id="c-forma">
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">NOTAS</label>
      <input class="form-input" type="text" id="c-notas" placeholder="Referencia, banco...">
    </div>
    <div class="divider"></div>
    <div class="section-title" style="margin-bottom:10px">Distribución automática</div>
    <div id="cobro-prev"></div>
    <div style="height:14px"></div>
    <button class="btn btn-primary" onclick="saveCobro('${viajeId}',${JSON.stringify(aports)},${yaU},${yaK})">Confirmar pago</button>
  `, () => {
    const el = $('c-monto');
    if (el) prevCobro(el, aports, yaU, yaK);
  });
};

window.setMonto = function(monto) {
  const el = $('c-monto');
  if (el) { el.value = Math.round(monto); el.dispatchEvent(new Event('input')); }
};

window.prevCobro = function(input, aports, yaU, yaK) {
  const monto = parseFloat(input.value) || 0;
  const pendU = Math.max(0, aports.filter(a=>a.quien==='uriel').reduce((s,a)=>s+Number(a.monto),0) - yaU);
  const pendK = Math.max(0, aports.filter(a=>a.quien==='kike').reduce((s,a)=>s+Number(a.monto),0) - yaK);
  const totalP = pendU + pendK;
  let rU = 0, rK = 0, rest = monto;
  if (totalP > 0 && rest > 0) {
    const pagar = Math.min(rest, totalP);
    rU = pagar * (pendU/totalP);
    rK = pagar * (pendK/totalP);
    rest -= (rU + rK);
  }
  const prev = $('cobro-prev');
  if (!prev) return;
  prev.innerHTML = '<div class="card-row"><span>'+chipOwner('uriel')+' recupera</span><span class="card-val" style="color:var(--blue)">'+fmt(rU)+'</span></div><div class="card-row"><span>'+chipOwner('kike')+' recupera</span><span class="card-val" style="color:var(--orange)">'+fmt(rK)+'</span></div><div class="divider"></div><div class="card-row"><span class="card-label">Utilidad a repartir</span><span class="card-val" style="color:var(--green)">'+fmt(rest)+'</span></div><div class="card-row"><span class="card-label">Uriel 50%</span><span class="card-val">'+fmt(rest/2)+'</span></div><div class="card-row"><span class="card-label">Kike 50%</span><span class="card-val">'+fmt(rest/2)+'</span></div>';
};

window.saveCobro = function(viajeId, aports, yaU, yaK) {
  const monto = parseFloat($('c-monto') ? $('c-monto').value : 0) || 0;
  const fecha = $('c-fecha') ? $('c-fecha').value : today();
  const forma = $('c-forma') ? $('c-forma').value : 'efectivo';
  const notas = $('c-notas') ? $('c-notas').value : '';
  if (!monto) { alert('Ingresa el monto'); return; }
  const pendU = Math.max(0, aports.filter(a=>a.quien==='uriel').reduce((s,a)=>s+Number(a.monto),0) - yaU);
  const pendK = Math.max(0, aports.filter(a=>a.quien==='kike').reduce((s,a)=>s+Number(a.monto),0) - yaK);
  const totalP = pendU + pendK;
  let rU = 0, rK = 0, rest = monto;
  if (totalP > 0 && rest > 0) {
    const pagar = Math.min(rest, totalP);
    rU = pagar * (pendU/totalP);
    rK = pagar * (pendK/totalP);
    rest -= (rU + rK);
  }
  const cobros = DB.get('cobros');
  cobros.push({ id: DB.id(), viajeId, fecha, monto, forma, notas, recuperaUriel: rU, recuperaKike: rK, utilidad: rest });
  DB.set('cobros', cobros);
  closeSheet(); render();
};

window.delGastoNIP = function(id) {
  pedirNIP(() => {
    // Borrar el gasto
    const gastos = DB.get('gastos');
    const gasto = gastos.find(g => g.id === id);
    DB.set('gastos', gastos.filter(g => g.id !== id));
    // Borrar también la aportación asociada si existe
    const aps = DB.get('aportaciones');
    const apsLimpias = aps.filter(a => !(a.viajeId === null && a.concepto === 'gasto-'+(gasto ? gasto.concepto : '') && a.monto === (gasto ? gasto.monto : -1) && a.fecha === (gasto ? gasto.fecha : '')));
    DB.set('aportaciones', apsLimpias);
    // Borrar en Firebase también
    if (window.db && gasto) {
      db.collection('aportaciones')
        .where('concepto', '==', 'gasto-'+gasto.concepto)
        .where('monto', '==', gasto.monto)

        .get().then(snap => {
          snap.docs.forEach(d => d.ref.delete());
        }).catch(e => console.warn('Error borrando aportación:', e));
    }
    render();
  });
};

// MÉTRICAS POR UNIDAD
// ══════════════════════════════════════════════════════
function calcMetricasUnidad(unidadId, mes) {
  const viajes = DB.get('viajes').filter(v => v.unidadId === unidadId && v.fecha && v.fecha.startsWith(mes));
  const gastos = DB.get('gastos');
  const nUnidades = Math.max(1, DB.get('unidades').length);
  const km = viajes.reduce((s,v) => s + Number(v.km||0), 0);
  const ingresos = viajes.reduce((s,v) => s + Number(v.flete||0), 0);
  const gastosViaje = viajes.reduce((s,v) => s + Number(v.casetas||0) + Number(v.combustible||0) + Number(v.viatico||0), 0);
  const sueldoChoferes = viajes.reduce((s,v) => s + (Number(v.flete||0) * Number(v.pctChofer||0) / 100), 0);
  const gastosDirect = gastos.filter(g => g.unidadId === unidadId && g.fecha && g.fecha.startsWith(mes)).reduce((s,g) => s + Number(g.monto||0), 0);
  // Solo gastos operativos reales se prorratean — excluye migraciones y "Otro" sin unidad
  const conceptosOperativos = ['Patio','GPS','Seguro','Mantenimiento','Descompostura'];
  const gastosGen = gastos.filter(g => !g.unidadId && g.fecha && g.fecha.startsWith(mes) && conceptosOperativos.includes(g.concepto)).reduce((s,g) => s + Number(g.monto||0), 0);
  const gastosProrr = gastosGen / nUnidades;
  const costoTotal = gastosViaje + sueldoChoferes + gastosDirect + gastosProrr;
  const utilidad = ingresos - costoTotal;
  return { km, ingresos, gastosViaje, sueldoChoferes, gastosDirect, gastosProrr, costoTotal, utilidad, costoPorKm: km > 0 ? costoTotal/km : null, ingresoPorKm: km > 0 ? ingresos/km : null, nViajes: viajes.length };
}

function buildMet(mes) {
  const unidades = DB.get('unidades');
  if (!unidades.length) return '<div class="empty"><p>Sin unidades registradas</p></div>';
  const mets = unidades.map(u => ({ u, m: calcMetricasUnidad(u.id, mes) }));
  const ranking = [...mets].sort((a,b) => b.m.utilidad - a.m.utilidad);
  const cpkms = mets.filter(x => x.m.costoPorKm != null).map(x => x.m.costoPorKm);
  const maxCpk = cpkms.length ? Math.max(...cpkms) : null;
  const minCpk = cpkms.length ? Math.min(...cpkms) : null;
  const fmtKm = n => n ? Number(n).toLocaleString('es-MX',{maximumFractionDigits:0})+' km' : '—';
  const fmtCkm = n => n != null ? '$'+Number(n).toFixed(2)+'/km' : '—';
  const medals = ['🥇','🥈','🥉'];

  return `<div class="section" style="padding-top:14px">
    <div class="section-title">Comparativa ${mes.replace('-','/')}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${ranking.map((x,i) => '<div style="flex:1;background:var(--bg2);border:1.5px solid '+(i===0?'var(--blue)':i===ranking.length-1&&x.m.utilidad<0?'var(--red)':'var(--border)')+';border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:22px">'+medals[i]+'</div><div style="font-size:12px;font-weight:700;margin:4px 0">'+x.u.nombre+'</div><div style="font-size:14px;font-weight:700;font-family:var(--mono);color:'+(x.m.utilidad>=0?'var(--green)':'var(--red)')+'">'+fmt(x.m.utilidad)+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+x.m.nViajes+' viaje'+( x.m.nViajes!==1?'s':'')+'</div></div>').join('')}
    </div>
    ${mets.map(({u, m}) => {
      const esPeor = m.costoPorKm === maxCpk && cpkms.length > 1;
      const esMejor = m.costoPorKm === minCpk && cpkms.length > 1 && minCpk !== maxCpk;
      return '<div class="card" style="border-left:3px solid '+(m.utilidad<0?'var(--red)':esMejor&&m.km>0?'var(--green)':'var(--border)')+'"><div class="card-row"><div><div style="font-weight:700;font-size:15px">'+u.nombre+'</div>'+(u.placas?'<div style="font-size:11px;color:var(--muted)">'+u.placas+(u.modelo?' · '+u.modelo:'')+'</div>':'')+'</div><div style="text-align:right"><div style="font-size:20px;font-weight:700;font-family:var(--mono);color:'+(m.utilidad>=0?'var(--green)':'var(--red)')+'">'+fmt(m.utilidad)+'</div><div style="font-size:10px;color:var(--muted)">utilidad neta</div></div></div><div class="divider"></div><div class="card-row"><span class="card-label">Kilómetros</span><span class="card-val">'+fmtKm(m.km)+'</span></div>'+(m.km>0?'<div class="card-row"><span class="card-label">Costo / km</span><span class="card-val" style="color:'+(esPeor?'var(--red)':esMejor?'var(--green)':'var(--text)')+'">'+fmtCkm(m.costoPorKm)+'</span></div><div class="card-row"><span class="card-label">Ingreso / km</span><span class="card-val" style="color:var(--blue)">'+fmtCkm(m.ingresoPorKm)+'</span></div>':'')+'<div class="divider"></div><div class="card-row"><span class="card-label">Ingresos (fletes)</span><span class="card-val" style="color:var(--blue)">'+fmt(m.ingresos)+'</span></div><div class="card-row"><span class="card-label">Gastos de viaje</span><span class="card-val" style="color:var(--red)">-'+fmt(m.gastosViaje)+'</span></div><div class="card-row"><span class="card-label">Sueldo choferes</span><span class="card-val" style="color:var(--red)">-'+fmt(m.sueldoChoferes)+'</span></div><div class="card-row"><span class="card-label">Gtos. directos</span><span class="card-val" style="color:var(--red)">-'+fmt(m.gastosDirect)+'</span></div><div class="card-row"><span class="card-label">Gtos. generales (÷'+DB.get('unidades').length+')</span><span class="card-val" style="color:var(--red)">-'+fmt(m.gastosProrr)+'</span></div>'+(esPeor&&m.km>0?'<div class="alert alert-red" style="margin-top:8px">Mayor costo/km este mes.</div>':'')+(m.utilidad<0?'<div class="alert alert-red" style="margin-top:8px">Operación con pérdida.</div>':'')+'</div>';
    }).join('')}
    <div class="section-title" style="margin-top:4px">Totales del mes</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">KM TOTALES</div><div class="stat-val blue">${mets.reduce((s,x)=>s+x.m.km,0).toLocaleString('es-MX')}</div></div>
      <div class="stat-box"><div class="stat-label">INGRESOS</div><div class="stat-val green">${fmt(mets.reduce((s,x)=>s+x.m.ingresos,0))}</div></div>
      <div class="stat-box"><div class="stat-label">COSTOS</div><div class="stat-val red">${fmt(mets.reduce((s,x)=>s+x.m.costoTotal,0))}</div></div>
      <div class="stat-box"><div class="stat-label">UTILIDAD</div><div class="stat-val ${mets.reduce((s,x)=>s+x.m.utilidad,0)>=0?'green':'red'}">${fmt(mets.reduce((s,x)=>s+x.m.utilidad,0))}</div></div>
    </div>
    <div style="height:8px"></div>
  </div>`;
}

function calcCorte() {
  const cortes = DB.get('cortes');
  const ultimoCorte = cortes.length ? cortes[cortes.length-1].fecha : null;
  const filtrar = arr => ultimoCorte ? arr.filter(x => (x.fecha||'') > ultimoCorte) : arr;
  const aports = filtrar(DB.get('aportaciones'));
  const cobros = filtrar(DB.get('cobros'));
  let sU = aports.filter(a=>a.quien==='uriel').reduce((s,a)=>s+Number(a.monto),0);
  let sK = aports.filter(a=>a.quien==='kike').reduce((s,a)=>s+Number(a.monto),0);
  sU -= cobros.reduce((s,c)=>s+Number(c.recuperaUriel||0),0);
  sK -= cobros.reduce((s,c)=>s+Number(c.recuperaKike||0),0);
  const util = cobros.reduce((s,c)=>s+Number(c.utilidad||0),0);
  const repU = util/2, repK = util/2;
  return { saldoUriel: Math.max(0,sU), saldoKike: Math.max(0,sK), utilidadTotal: util, repUriel: repU, repKike: repK, totalUriel: Math.max(0,sU)+repU, totalKike: Math.max(0,sK)+repK, desde: ultimoCorte, viajesCount: filtrar(DB.get('viajes')).length, cobradoTotal: cobros.reduce((s,c)=>s+Number(c.monto||0),0) };
}

window.saveCli = function(editId) {

window.delItem = function(tabla, id) {

  DB.set(tabla, DB.get(tabla).filter(x=>x.id!==id));
  closeSheet(); render();
};

// QUICK ADD
// ══════════════════════════════════════════════════════
function quickAdd(tipo) {
  if (tipo === 'viaje') formViaje();
  else if (tipo === 'cobro') {
    const pend = DB.get('viajes').filter(v => viajeDeuda(v.id) > 0);
    if (!pend.length) { alert('No hay viajes pendientes de cobro'); return; }
    quickCobro(pend[0].id);
  }
  else if (tipo === 'gasto') formGasto();
  else if (tipo === 'cliente') formCliente();
  else if (tipo === 'corte') iniciarCorte();
}

// ══════════════════════════════════════════════════════
// EXPORTAR A EXCEL
// ══════════════════════════════════════════════════════
window.exportarExcel = async function() {
  // Cargar SheetJS dinámicamente
  if (!window.XLSX) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
  }

  const wb = XLSX.utils.book_new();
  const clientes = DB.get('clientes');
  const unidades = DB.get('unidades');
  const operadores = DB.get('operadores');
  const cobros = DB.get('cobros');
  const nominas = DB.get('nominas');

  // ── Hoja 1: VIAJES ──
  const viajes = DB.get('viajes').map(v => {
    const cliente = clientes.find(c => c.id === v.clienteId);
    const unidad = unidades.find(u => u.id === v.unidadId);
    const op = operadores.find(o => o.id === v.operadorId);
    const cobrado = cobros.filter(c => c.viajeId === v.id).reduce((s,c) => s + Number(c.monto), 0);
    const anticipo = Number(v.anticipo||0);
    const deuda = Math.max(0, Number(v.flete||0) - anticipo - cobrado);
    const gastosExtra = (v.gastosExtra||[]).reduce((s,g) => s + Number(g.monto||0), 0);
    const pagoChofer = (Number(v.flete||0) * Number(v.pctChofer||0) / 100);
    return {
      'Fecha': v.fecha || '',
      'Origen': v.origen || '',
      'Destino': v.destino || '',
      'Cliente': cliente ? cliente.nombre : '',
      'Unidad': unidad ? unidad.nombre : '',
      'Operador': op ? op.nombre : '',
      'Km': Number(v.km||0),
      'Flete': Number(v.flete||0),
      'Anticipo cliente': anticipo,
      'Casetas': Number(v.casetas||0),
      'Combustible': Number(v.combustible||0),
      'Viático': Number(v.viatico||0),
      'Gastos en camino': gastosExtra,
      'Otros gastos': Number(v.otrosGastos||0),
      '% Chofer': Number(v.pctChofer||0),
      'Pago chofer estimado': pagoChofer,
      'Total cobrado': cobrado + anticipo,
      'Saldo por cobrar': deuda,
      'Fecha vencimiento': v.fechaVence || '',
      'Estado': v.estado || 'completado',
    };
  });
  const ws1 = XLSX.utils.json_to_sheet(viajes);
  // Anchos de columna
  ws1['!cols'] = [10,12,12,18,14,16,8,12,14,10,12,10,14,12,8,16,14,14,16,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Viajes');

  // ── Hoja 2: COBROS ──
  const cobrosData = cobros.map(c => {
    const viaje = DB.get('viajes').find(v => v.id === c.viajeId);
    const cliente = viaje ? clientes.find(x => x.id === viaje.clienteId) : null;
    return {
      'Fecha': c.fecha || '',
      'Cliente': cliente ? cliente.nombre : '',
      'Ruta': viaje ? (viaje.origen+' → '+viaje.destino) : '',
      'Monto cobrado': Number(c.monto||0),
      'Forma de pago': c.forma || '',
      'Recupera Uriel': Number(c.recuperaUriel||0),
      'Recupera Kike': Number(c.recuperaKike||0),
      'Utilidad negocio': Number(c.utilidad||0),
      'Notas': c.notas || '',
    };
  });
  const ws2 = XLSX.utils.json_to_sheet(cobrosData.length ? cobrosData : [{'Sin cobros registrados':''}]);
  ws2['!cols'] = [10,18,22,14,14,14,14,14,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Cobros');

  // ── Hoja 3: GASTOS ──
  const gastos = DB.get('gastos').map(g => {
    const unidad = unidades.find(u => u.id === g.unidadId);
    return {
      'Fecha': g.fecha || '',
      'Concepto': g.concepto || '',
      'Descripción': g.descripcion || '',
      'Unidad': unidad ? unidad.nombre : 'General',
      'Monto': Number(g.monto||0),
      'Pagado por': g.quien || '',
    };
  });
  const ws3 = XLSX.utils.json_to_sheet(gastos.length ? gastos : [{'Sin gastos':''}]);
  ws3['!cols'] = [10,16,28,14,12,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Gastos');

  // ── Hoja 4: NÓMINA ──
  const nominasData = nominas.map(n => {
    const op = operadores.find(o => o.id === n.operadorId);
    return {
      'Semana inicio': n.semanaIni || '',
      'Semana fin': n.semanaFin || '',
      'Operador': op ? op.nombre : '',
      'Total pagado': Number(n.total||0),
      'Pagado por': n.quien || '',
      'Forma': n.forma || '',
      'Notas': n.notas || '',
    };
  });
  const ws4 = XLSX.utils.json_to_sheet(nominasData.length ? nominasData : [{'Sin nóminas':''}]);
  ws4['!cols'] = [12,12,18,14,12,12,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws4, 'Nómina');

  // ── Hoja 5: RESUMEN ──
  const totalFlete = DB.get('viajes').reduce((s,v) => s + Number(v.flete||0), 0);
  const totalCobrado = cobros.reduce((s,c) => s + Number(c.monto||0), 0);
  const totalAnticip = DB.get('viajes').reduce((s,v) => s + Number(v.anticipo||0), 0);
  const totalGastos = DB.get('gastos').reduce((s,g) => s + Number(g.monto||0), 0);
  const totalNomina = nominas.reduce((s,n) => s + Number(n.total||0), 0);
  const porCobrar = DB.get('viajes').reduce((s,v) => s + viajeDeuda(v.id), 0);
  const saldo = saldoBalance();

  const resumen = [
    {'Concepto': 'Total fletes emitidos', 'Monto': totalFlete},
    {'Concepto': 'Total anticipos recibidos', 'Monto': totalAnticip},
    {'Concepto': 'Total cobrado', 'Monto': totalCobrado},
    {'Concepto': 'Saldo por cobrar', 'Monto': porCobrar},
    {'Concepto': '', 'Monto': ''},
    {'Concepto': 'Total gastos registrados', 'Monto': totalGastos},
    {'Concepto': 'Total nóminas pagadas', 'Monto': totalNomina},
    {'Concepto': '', 'Monto': ''},
    {'Concepto': 'Saldo a favor Uriel', 'Monto': saldo.uriel},
    {'Concepto': 'Saldo a favor Kike', 'Monto': saldo.kike},
    {'Concepto': '', 'Monto': ''},
    {'Concepto': 'Exportado el', 'Monto': today()},
  ];
  const ws5 = XLSX.utils.json_to_sheet(resumen);
  ws5['!cols'] = [{wch:28},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws5, 'Resumen');

  // Descargar
  const fecha = today().replace(/-/g,'');
  XLSX.writeFile(wb, `argos-respaldo-${fecha}.xlsx`);
};

// AUTENTICACIÓN
// ══════════════════════════════════════════════════════
window.doLogin = async function() {
  const email = document.getElementById('login-email')?.value?.trim();
  const pass  = document.getElementById('login-pass')?.value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');
  if (!email || !pass) { if(err){err.style.display='block';err.textContent='Ingresa correo y contraseña';} return; }
  if(btn) btn.textContent = 'Entrando...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    if(err) err.style.display='none';
  } catch(e) {
    if(err){ err.style.display='block'; err.textContent = e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' ? 'Contraseña incorrecta' : e.code === 'auth/user-not-found' ? 'Usuario no encontrado' : 'Error al iniciar sesión'; }
  }
  if(btn) btn.textContent = 'Iniciar sesión';
};

// Enter en campos de login
document.addEventListener('DOMContentLoaded', () => {
  ['login-email','login-pass'].forEach(id => {
    document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') window.doLogin(); });
  });
});

window.doLogout = async function() {
  await auth.signOut();
};

window.verUsuarios = async function() {
  if (!puedo('usuarios')) { alert('Sin permisos'); return; }
  const snap = await db.collection('usuarios').get();
  const usuarios = snap.docs.map(d => d.data());
  const rolLabel = { admin:'Admin', operativo:'Operativo', lectura:'Solo lectura' };

  openSheet('Gestión de usuarios', `
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Usuarios registrados en el sistema</div>
    ${usuarios.map(u => `
    <div class="card" style="margin-bottom:8px">
      <div class="card-row">
        <div>
          <div style="font-weight:600">${u.nombre||u.email}</div>
          <div class="card-label">${u.email}</div>
        </div>
        <span class="badge ${u.rol==='admin'?'badge-blue':u.rol==='operativo'?'badge-orange':'badge-green'}">${rolLabel[u.rol]||u.rol}</span>
      </div>
      ${u.uid !== currentUser?.uid ? `
      <div style="display:flex;gap:8px;margin-top:8px">
        <select class="form-select" id="rol-${u.uid}" style="flex:1">
          <option value="admin" ${u.rol==='admin'?'selected':''}>Admin</option>
          <option value="operativo" ${u.rol==='operativo'?'selected':''}>Operativo</option>
          <option value="lectura" ${u.rol==='lectura'?'selected':''}>Solo lectura</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="cambiarRol('${u.uid}')">Guardar</button>
      </div>` : '<div class="card-label" style="margin-top:6px">Tu cuenta</div>'}
    </div>`).join('')}
    <div class="divider"></div>
    <div style="font-weight:600;margin-bottom:12px">Crear nuevo usuario</div>
    <div class="form-group"><label class="form-label">NOMBRE</label><input class="form-input" id="nu-nombre" placeholder="Nombre completo"></div>
    <div class="form-group"><label class="form-label">CORREO</label><input class="form-input" type="email" id="nu-email" placeholder="correo@ejemplo.com"></div>
    <div class="form-group"><label class="form-label">CONTRASEÑA INICIAL</label><input class="form-input" type="password" id="nu-pass" placeholder="Mínimo 6 caracteres"></div>
    <div class="form-group"><label class="form-label">ROL</label>
      <select class="form-select" id="nu-rol">
        <option value="operativo">Operativo</option>
        <option value="lectura">Solo lectura</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div id="nu-error" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" onclick="crearUsuario()">Crear usuario</button>
  `);
};

window.cambiarRol = async function(uid) {
  const nuevoRol = document.getElementById('rol-'+uid)?.value;
  if (!nuevoRol) return;
  try {
    await db.collection('usuarios').doc(uid).update({ rol: nuevoRol });
    alert('✓ Rol actualizado');
    closeSheet();
  } catch(e) { alert('Error: '+e.message); }
};

window.crearUsuario = async function() {
  const nombre = document.getElementById('nu-nombre')?.value?.trim();
  const email  = document.getElementById('nu-email')?.value?.trim();
  const pass   = document.getElementById('nu-pass')?.value;
  const rol    = document.getElementById('nu-rol')?.value;
  const errEl  = document.getElementById('nu-error');

  if (!nombre||!email||!pass) { if(errEl){errEl.style.display='block';errEl.textContent='Todos los campos son requeridos';} return; }
  if (pass.length < 6) { if(errEl){errEl.style.display='block';errEl.textContent='La contraseña debe tener al menos 6 caracteres';} return; }

  try {
    // Crear usuario secundario sin afectar la sesión actual
    const secondApp = firebase.initializeApp(firebaseConfig, 'secondary-'+Date.now());
    const secondAuth = secondApp.auth();
    const cred = await secondAuth.createUserWithEmailAndPassword(email, pass);
    await db.collection('usuarios').doc(cred.user.uid).set({
      uid: cred.user.uid, email, nombre, rol, creadoEn: new Date().toISOString()
    });
    await secondAuth.signOut();
    await secondApp.delete();
    closeSheet();
    alert('✓ Usuario creado: '+email);
  } catch(e) {
    if(errEl){ errEl.style.display='block'; errEl.textContent = e.code==='auth/email-already-in-use' ? 'Ese correo ya está registrado' : e.message; }
  }
};
